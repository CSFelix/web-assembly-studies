<!DOCTYPE html>

<html>
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="Content-Type" content="text/html" />
    
    <title>Streaming Web Assembly</title>

    <style>
      * { background-color: #363636; color: #f6f6ff; }
    </style>
    
    <link rel="shortcut icon" type="image/svg+xml" href="./assets/wasm.svg" />

    <script type="text/javascript" defer>
      let exports = null;

      WebAssembly.instantiateStreaming(
        fetch("./streaming.wasm"), {}
      ).then(results => {
        exports = results.instance.exports;
      });
    </script>
  </head>

  <body>
    <span>Hey there, Web Assembly!</span>
    <input id="numberN" type="number" />

    <button id="sumNumbersButton">Sum Numbers</button>
    <span id="result">Result:</span>

    <script type="text/javascript">
      const sumNumbersButton = document.getElementById("sumNumbersButton");

      sumNumbersButton.addEventListener("click", () => {
        if (!exports || Object.keys(exports).length === 0) return;

        const numberN = document.getElementById("numberN")?.value || 0;
        const sum = exports.sumOfNIntegers(numberN);
        
        const resultSpan = document.getElementById("result");
        if (resultSpan) resultSpan.innerText = `Result: ${sum} (streaming)`;
      });
    </script>
  </body>
</html>
